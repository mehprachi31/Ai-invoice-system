<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}AI Invoice Processing System{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="wrapper">

        <!-- Sidebar -->
        <nav class="sidebar">

            <div class="logo">
                <i class="fa-solid fa-file-invoice-dollar"></i>
                <span>AI Invoice</span>
            </div>

            <ul>

                <li>
                    <a href="/">
                        <i class="fa-solid fa-house"></i>
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="/upload">
                        <i class="fa-solid fa-upload"></i>
                        Upload Invoice
                    </a>
                </li>

                <li>
                    <a href="/invoices">
                        <i class="fa-solid fa-file-lines"></i>
                        Invoices
                    </a>
                </li>

                <li>
                    <a href="/reports">
                        <i class="fa-solid fa-chart-column"></i>
                        Reports
                    </a>
                </li>

                <li>
                    <a href="/profile">
                        <i class="fa-solid fa-user"></i>
                        Profile
                    </a>
                </li>

                <li>
                    <a href="/settings">
                        <i class="fa-solid fa-gear"></i>
                        Settings
                    </a>
                </li>

                <li>
                    <a href="/logout">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        Logout
                    </a>
                </li>

            </ul>

        </nav>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Top Navbar -->
            <nav class="navbar navbar-expand-lg bg-white shadow-sm rounded mb-4">

                <div class="container-fluid">

                    <h4 class="fw-bold text-primary">
                        AI Invoice Processing System
                    </h4>

                    <div class="d-flex align-items-center">

                        <span class="me-3 fw-semibold">
                            Welcome Admin
                        </span>

                        <img src="https://i.pravatar.cc/45" class="rounded-circle" alt="profile">

                    </div>

                </div>

            </nav>

            <!-- Dynamic Page Content -->
            {% block content %}

            {% endblock %}

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>

</html>
